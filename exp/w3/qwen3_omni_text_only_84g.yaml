# Temporary 84GB full-probe config: stage-0 Qwen3-Omni audio understanding
# with text output only. Keeps the original audio deterministic budget (8192)
# while avoiding the retired audio-output stages.
async_chunk: false

modes:
  - mode: text-to-image
    stages: [0]

stages:
  - stage_id: 0
    max_model_len: 8192
    max_num_batched_tokens: 8192
    max_num_seqs: 1
    gpu_memory_utilization: 0.78
    trust_remote_code: true
    enable_prefix_caching: false
    devices: "0"
    default_sampling_params:
      temperature: 0.0
      max_tokens: 2048
