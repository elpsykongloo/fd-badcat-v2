# Temporary 84GB Qwen3-Omni full audio-output config for HumDial regression.
# Keeps the canonical deterministic single-user shape, but reduces the large
# code2wav context and shifts memory to stage-0 so it has KV cache on RTX 6000D.
async_chunk: true

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      initial_codec_chunk_frames: 4
      codec_chunk_frames: 25
      codec_left_context_frames: 25
      connector_get_sleep_s: 0.01
      connector_get_max_wait_first_chunk: 3000
      connector_get_max_wait: 300

stages:
  - stage_id: 0
    max_num_batched_tokens: 8192
    max_model_len: 8192
    max_num_seqs: 1
    gpu_memory_utilization: 0.78
    trust_remote_code: true
    enable_prefix_caching: false
    devices: "0"
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0
      max_tokens: 256
      seed: 42

  - stage_id: 1
    max_num_batched_tokens: 8192
    max_model_len: 8192
    max_num_seqs: 1
    gpu_memory_utilization: 0.12
    trust_remote_code: true
    enable_prefix_caching: false
    devices: "0"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    output_connectors:
      to_stage_2: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.5
      top_k: 20
      max_tokens: 512
      seed: 42
      repetition_penalty: 1.05

  - stage_id: 2
    max_num_batched_tokens: 8192
    max_model_len: 8192
    max_num_seqs: 1
    gpu_memory_utilization: 0.08
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    enable_chunked_prefill: false
    async_scheduling: false
    devices: "0"
    input_connectors:
      from_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.1
