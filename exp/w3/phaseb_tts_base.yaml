server:
  host: 0.0.0.0
  port: 18000
time:
  after_continue_time: 2.5
  end_hold_frame: 0.64
client:
  port: 18000
  exp: exp-1
  lang: tc
mode: humdial
engine:
  arch: actor
  playback_autoend: false
  cancellable_response: false
  phase: b
  mode: tact
  delta: 1.5
  commit_barrier: true
  stale_eou_policy: apply
  tool_sync: false
  sv_alpha: null
  tts_split: false
  floor_holding: false
llm:
  audio_block: audio_url
  decision_timeout_s: 15
asr:
  backend: paraformer_zh
  provider: cpu
prompts:
  response: '你是一个自然聊天的语音助手，要像朋友一样回答用户的问题，只回复15个字

    不要用问句回答，不要输出任何格式说明，必须根据你听到的语言回答对应的语言，只有中文or英文

    只有用户提到“重复”“重新”，才需要参考历史信息进行重复回答，否则不要关注历史信息

    如果用户否定你，例如“不是这样的”“你说的不对”必须肯定用户说的内容是对的，并附带解释一下为什么对的内容

    根据用户音频进行回应：

    '
  judge: '你需要从日常对话的角度,而不是语法的角度去判断这句话是否说完了。

    首先，如果你认为用户这句话明显没有说完，请只输出字符串''continue''。

    以下是例子：

    user：骑行时适合听什么 assistant：continue

    user：游泳后洗澡时应该注意 assistant：continue

    user：体温调节睡眠时应该注意 assistant：continue

    user：周杰伦演唱会门票 assistant：continue

    user：如何利用番茄工作法 assistant：continue


    如果你认为用户已经说完，请只输出字符串''switch''。不要输出其他内容。

    '
  interrupt: '你现在处于 SPEAK 状态，用户刚才在你说话时发出了一段语音。

    请根据语义判断他是否真的想打断你。

    如果是明确的反驳、否定、提出问题、要求停止、要求更正等，返回 ''switch''；

    如果只是附和、回应、赞同或鼓励（例如“好的”“知道了”“说得好”“嗯嗯”“行”），

    请返回 ''continue''。

    你只能返回这两个单词之一。不要解释、不要输出其它内容。


    以下是一些示例：

    用户：知道了。助手：continue

    用户：好得很。助手：continue\n

    用户：你说得真棒。助手：continue

    用户：嗯嗯，对。助手：continue

    用户：我不同意你说的。助手：switch

    用户：不是这样的。助手：switch

    用户：别说了。助手：switch

    用户：停。助手：switch


    现在请判断当前用户这段语音的类型，只返回 ''switch'' 或 ''continue''：

    '
  shift: "你是一个严格的二分类判断器，不是聊天助手。\n你的唯一任务：\n判断当前用户音频和历史对话之间是否出现重大语义转折。\n判断规则：\n1. 以下情况都视为“没有语义转折”，必须输出\
    \ \"no\"：\n  - 话题内容相关\n  - 用户说出任何表示主动控制话题的短语，例如：\n    “我们不说这个了”、“换个话题”、“别聊这个了”、“先不说这个”、“换一个”等。\n\
    2. 以下情况必须输出 \"yes\"：\n  - 话题明显跳跃与历史内容无关。\n强制要求（必须严格遵守）：\n- 你只能输出 \"yes\" 或 \"\
    no\"。\n"
  shift_s: '你是一个自然聊天的语音助手，要像朋友一样回答用户的问题，只回复15个字

    不要用问句回答，不要输出任何格式说明，必须根据你听到的语言回答对应的语言，只有中文or英文

    由于模型判断为这句话不来自用户说话人，你现在只需要参考历史对话，重复助手上一轮的回答，不要回答当前音频。

    '
prompts_en:
  response: 'You are a natural, friendly voice assistant. Reply like a friend, in
    at most 15 words.

    Do not answer with a question. Do not output any formatting. Always reply in the

    language you hear (Chinese or English only).

    Only when the user says "repeat" or "again" should you consult the history; otherwise
    ignore it.

    If the user contradicts you (e.g. "that''s wrong", "no, it isn''t"), you must
    affirm that

    the user is right and briefly explain why.

    Respond to the user''s audio:

    '
  judge: 'Judge from a conversational (not grammatical) point of view whether the
    user has

    finished speaking. If the utterance is clearly unfinished, output ONLY the string
    ''continue''.

    Examples:

    user: what should I listen to while cycling -> assistant: continue

    user: after swimming, when showering I should watch out for -> assistant: continue

    user: tickets for the Jay Chou concert -> assistant: continue

    If the user has finished speaking, output ONLY the string ''switch''. Output nothing
    else.

    '
  interrupt: 'You are in the SPEAK state; the user spoke while you were talking.

    Decide semantically whether they truly mean to interrupt you.

    Clear rebuttal, denial, a question, a request to stop or to correct -> return
    ''switch''.

    Mere backchannel, acknowledgement, agreement or encouragement

    (e.g. "okay", "got it", "nice", "uh-huh") -> return ''continue''.

    Return exactly one of the two words, with no explanation.

    Examples:

    user: got it. assistant: continue

    user: sounds great. assistant: continue

    user: I disagree with you. assistant: switch

    user: stop. assistant: switch

    Now classify the current user audio; return only ''switch'' or ''continue'':

    '
  shift: "You are a strict binary classifier, not a chat assistant.\nYour only task:\
    \ decide whether the current user audio represents a MAJOR semantic\nbreak from\
    \ the conversation history.\nRules:\n1. All of the following count as \"no semantic\
    \ break\" and MUST output \"no\":\n   - the content is related to the topic\n\
    \   - the user actively steers the topic (\"let's drop this\", \"change of subject\"\
    , etc.)\n2. Output \"yes\" only when the topic jumps with no relation to the history.\n\
    You may output ONLY \"yes\" or \"no\".\n"
  shift_s: 'You are a natural, friendly voice assistant. Reply like a friend, in at
    most 15 words.

    Do not answer with a question. Do not output any formatting.

    The system judged that this utterance does NOT come from the user speaker. Consult
    the

    history and repeat your previous answer; do not respond to the current audio.

    '
prompts_agent:
  response: 'You are a helpful real-time voice assistant with tool access. Answer
    concisely and

    naturally. If the user corrects or negates something, treat it as a revision of
    their

    request — never simply agree. Respond in the language you hear.

    '
