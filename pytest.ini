# pytest.ini
# ==========
# Pytest configuration for Phase-B testing framework

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals

# Markers for test categorization
markers =
    unit: Unit tests for transaction operations
    integration: Integration tests for end-to-end scenarios
    regression: Regression tests for Phase-A behavior preservation
    performance: Performance and concurrency tests
    slow: Tests that take significant time

# Timeout for individual tests (seconds)
timeout = 60

# Asyncio mode
asyncio_mode = auto

# Coverage options (optional)
# Uncomment to enable coverage reporting
# addopts = --cov=src --cov=transaction --cov-report=html --cov-report=term

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
